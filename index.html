<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fallback title shown before React hydrates; Helmet overrides per-page -->
    <title>Alpha Speed AI | DFW AI Automation Studio</title>
    <!-- Per-page meta tags (description, keywords, OG, Twitter, canonical) are
         injected by react-helmet-async in each page component -->

    <!-- JSON-LD structured data (LocalBusiness, WebSite, Service, BreadcrumbList)
         is injected per-page via react-helmet-async using src/lib/schema.ts -->
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Google tag (gtag.js) — loaded immediately before React to ensure GA4
         receives every session. Consent Mode v2 defaults deny analytics_storage
         until the user accepts the cookie banner, at which point analytics.ts
         calls gtag('consent','update',{analytics_storage:'granted'}). -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA_MEASUREMENT_ID%"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        analytics_storage: 'denied',
        ad_storage: 'denied',
        wait_for_update: 500
      });
      gtag('js', new Date());
      gtag('config', '%VITE_GA_MEASUREMENT_ID%', { send_page_view: false });
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
