<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fallback title shown before React hydrates; Helmet overrides per-page -->
    <title>Alpha Speed AI | DFW AI Automation Studio</title>
    <!-- Per-page meta tags (description, keywords, OG, Twitter, canonical) are
         injected by react-helmet-async in each page component -->

    <!-- JSON-LD structured data (LocalBusiness, WebSite, Service, BreadcrumbList)
         is injected per-page via react-helmet-async using src/lib/schema.ts -->
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Google tag (gtag.js) — fires for all visitors so GA4 captures traffic.
         send_page_view:false because AnalyticsTracker fires page_view on each
         SPA route change instead. Ad pixels remain consent-gated in analytics.ts. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA_MEASUREMENT_ID%"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '%VITE_GA_MEASUREMENT_ID%', { send_page_view: false });
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
