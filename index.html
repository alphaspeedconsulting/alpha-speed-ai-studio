<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fallback title shown before React hydrates; Helmet overrides per-page -->
    <title>Alpha Speed AI | DFW AI Automation Studio</title>
    <!-- Per-page meta tags (description, keywords, OG, Twitter, canonical) are
         injected by react-helmet-async in each page component -->

    <!-- JSON-LD structured data (LocalBusiness, WebSite, Service, BreadcrumbList)
         is injected per-page via react-helmet-async using src/lib/schema.ts -->
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Analytics injected by src/lib/analytics.ts via VITE_GA_MEASUREMENT_ID env var -->
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
